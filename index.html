  { id: "backstroke", name: "Backstroke", level: 3, tags: ["WSFlex", "Bauchkraft", "Schultergürtelorganisation", "Rumpfkontrolle", "Koordination und Gleichgewicht"], sequence: [2, 6], note: "Kombinierte Bein- und Rumpfbewegung" },

  { id: "footwork", name: "Footwork", level: 1, tags: [], sequence: [], note: "Fußarbeit, Aufwärmen, Beinachse" },
  { id: "forward-bend-:-standing-s.-1784031803694", name: "Forward Bend : Standing S.", level: 2, tags: ["WSFlex", "Hüftmobilität", "Koordination und Gleichgewicht", "Beinachse"], sequence: [7], note: "" },
  { id: "front/back-split-:-standing-s.-1784031659098", name: "Front/Back Split : Standing S.", level: 2, tags: ["Koordination und Gleichgewicht", "Hüftmobilität", "Rumpfkontrolle", "Beinachse"], sequence: [7], note: "" },
  { id: "inverted-v--long-stretch-series-1783978454746", name: "Inverted V -long Stretch series", level: 2, tags: [], sequence: [3], note: "" },

  { id: "long-box-series:-prone-shoulder-press-+extension-1783978730007", name: "Long Box series: prone shoulder Press +Extension", level: 1, tags: ["WSExt"], sequence: [3, 4], note: "" },

  { id: "overhead", name: "Overhead", level: 2, tags: ["WSFlex"], sequence: [2], note: "Kombinierte Vor-/Rückbeuge, Übergang zur Rückenserie" },
  { id: "quadruped-1783977941383", name: "Quadruped", level: 1, tags: [], sequence: [3], note: "" },
  { id: "reverse-abdominals-1783978650379", name: "Reverse Abdominals", level: 2, tags: [], sequence: [3], note: "" },
  { id: "semicircle", name: "Semi-Circle", level: 2, tags: ["WSExt", "WSFlex"], sequence: [6], note: "Verbesserte Ws-beweglichkeit" },

  { id: "shortspine", name: "Short Spine Massage", level: 3, tags: ["WSFlex", "WSRot"], sequence: [], note: "Komplexe Wirbelsäulenartikulation" },
  { id: "sidesplits", name: "Side Splits : Standing S.", level: 1, tags: ["Koordination und Gleichgewicht", "Beinkraft", "Hüftmobilität", "Beinachse"], sequence: [7], note: "Frontale Ebene, Beinachsenkontrolle" },
  { id: "sidebend-:-short-box-s.-1784028873450", name: "Sidebend : Short Box S.", level: 2, tags: ["WSLatflex", "Schultergürtelorganisation", "Bauchkraft"], sequence: [5, 6], note: "" },

  { id: "stomachmassageround", name: "Stomach Massage Round", level: 2, tags: ["WSFlex"], sequence: [5], note: "Sitzend, Langsitz, Körperwahrnehmung" },

  { id: "supine-reverse-abdominals--1784031214652", name: "Supine Reverse Abdominals", level: 2, tags: ["Bauchkraft", "WSFlex", "Hüftmobilität", "Rumpfkontrolle"], sequence: [2], note: "" },
  { id: "teaser", name: "Teaser", level: 3, tags: ["WSFlex"], sequence: [5, 6], note: "Komplexe Flexion mit Balance" },
  { id: "tendonstretch", name: "Tendon Stretch", level: 2, tags: [], sequence: [], note: "Wadenkraft, Gleichgewicht im Stand" },
  { id: "testübung-1784028756373", name: "Testübung", level: 1, tags: ["WSExt", "WSFlex"], sequence: [1, 2, 3, 4, 5, 6, 7], note: "Nur für Programmtest" },
  { id: "hundred", name: "The Hundred", level: 1, tags: ["WSFlex"], sequence: [], note: "Aufwärmen der Körpermitte, Atemrhythmus" },
  { id: "twist:-short-box-s.-1784028958495", name: "Twist: Short Box S.", level: 2, tags: ["WSRot", "Schultergürtelorganisation", "Bauchkraft"], sequence: [5, 6], note: "" },
];

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function arraysEqualAsSets(a, b) {
  const aa = [...(a || [])].sort();
  const bb = [...(b || [])].sort();
  if (aa.length !== bb.length) return false;
  return aa.every((v, i) => v === bb[i]);
}

function LevelDot({ level, size }) {
  size = size || 10;
  const l = LEVELS.find((x) => x.id === level);
  return (
    <span
      style={{
        display: "inline-block",
        width: size,
        height: size,
        borderRadius: 9999,
        backgroundColor: l.color,
        boxShadow: "0 0 0 2px rgba(0,0,0,0.06)",
      }}
    />
  );
}

function PilatesReformerFilter() {
  const STORAGE_KEY = "reformer-uebersicht-daten";
  const VERSION_KEY = "reformer-uebersicht-version";
  const fileInputRef = useRef(null);

  const [exercises, setExercises] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : SEED_EXERCISES;
    } catch (e) {
      return SEED_EXERCISES;
    }
  });

  const [loadedVersion, setLoadedVersion] = useState(() => {
    try {
      const savedVersion = localStorage.getItem(VERSION_KEY);
      if (savedVersion) return savedVersion;
      // Kein gespeicherter Stand vorhanden - das ist ein frischer Ladevorgang mit dem aktuellen Code
      localStorage.setItem(VERSION_KEY, APP_VERSION);
      return APP_VERSION;
    } catch (e) {
      return APP_VERSION;
    }
  });
  const [activeLevels, setActiveLevels] = useState([]);
  const [activeTags, setActiveTags] = useState([]);
  const [activeSequence, setActiveSequence] = useState([]);
  const [query, setQuery] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [showResetConfirm, setShowResetConfirm] = useState(false);

  const [tableRowAxis, setTableRowAxis] = useState("Übungen");
  const [tableColAxis, setTableColAxis] = useState("Level");
  const [appliedRowAxis, setAppliedRowAxis] = useState(null);
  const [appliedColAxis, setAppliedColAxis] = useState(null);
  const [draft, setDraft] = useState({ name: "", level: 1, tags: [], sequence: [], note: "" });

  const [mode, setMode] = useState("browse");
  const [practiceOrder, setPracticeOrder] = useState([]);
  const [practiceIndex, setPracticeIndex] = useState(0);
  const [practiceAnswer, setPracticeAnswer] = useState({ level: null, tags: [], sequence: [] });
  const [practiceFinished, setPracticeFinished] = useState(false);

  const [practice2Order, setPractice2Order] = useState([]);
  const [practice2Index, setPractice2Index] = useState(0);
  const [practice2Selected, setPractice2Selected] = useState([]);
  const [practice2Finished, setPractice2Finished] = useState(false);

  const [practice3Order, setPractice3Order] = useState([]);
  const [practice3Index, setPractice3Index] = useState(0);
  const [practice3Selected, setPractice3Selected] = useState([]);
  const [practice3Finished, setPractice3Finished] = useState(false);

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(exercises));
    } catch (e) {
      // Speicher voll oder nicht verfügbar - kein Abbruch nötig
    }
  }, [exercises]);

  function exportData() {
    const blob = new Blob([JSON.stringify(exercises, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "reformer-uebungen.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const data = JSON.parse(event.target.result);
        if (Array.isArray(data)) {
          setExercises(data);
        } else {
          alert("Diese Datei enthält keine gültige Übungsliste.");
        }
      } catch (err) {
        alert("Die Datei konnte nicht gelesen werden. Ist es eine gültige JSON-Datei?");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function applyTable() {
    setAppliedRowAxis(tableRowAxis);
    setAppliedColAxis(tableColAxis);
  }

  function axisMatches(ex, axis, value) {
    if (axis === "Level") return ex.level === value;
    if (axis === "Sequencing") return (ex.sequence || []).includes(value);
    return false;
  }

  function axisValues(axis) {
    if (axis === "Level") return [1, 2, 3];
    if (axis === "Sequencing") return SEQUENCING;
    if (axis === "Übungen") return exercises;
    return [];
  }

  function axisValueLabel(axis, value) {
    if (axis === "Level") return "Level " + value;
    if (axis === "Sequencing") return String(value);
    if (axis === "Übungen") return value.name;
    return "";
  }

  function resetToDefault() {
    setShowResetConfirm(true);
  }

  function confirmReset() {
    try {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.setItem(VERSION_KEY, APP_VERSION);
    } catch (e) {
      // Speicher nicht verfügbar - kein Abbruch nötig
    }
    setExercises(SEED_EXERCISES);
    setLoadedVersion(APP_VERSION);
    setShowResetConfirm(false);
  }

  function cancelReset() {
    setShowResetConfirm(false);
  }

  function toggle(arr, setArr, value) {
    setArr(arr.includes(value) ? arr.filter((v) => v !== value) : [...arr, value]);
  }

  const filtered = useMemo(() => {
    return exercises.filter((ex) => {
      const levelOk = activeLevels.length === 0 || activeLevels.includes(ex.level);
      const tagsOk = activeTags.length === 0 || activeTags.every((t) => ex.tags.includes(t));
      const seqOk =
        activeSequence.length === 0 || activeSequence.some((s) => (ex.sequence || []).includes(s));
      const queryOk =
        query.trim() === "" || ex.name.toLowerCase().includes(query.trim().toLowerCase());
      return levelOk && tagsOk && seqOk && queryOk;
    });
  }, [exercises, activeLevels, activeTags, activeSequence, query]);

  function saveExercise() {
    if (!draft.name.trim()) return;
    if (editingId) {
      setExercises((prev) =>
        prev.map((ex) =>
          ex.id === editingId
            ? {
                ...ex,
                name: draft.name.trim(),
                level: draft.level,
                tags: draft.tags,
                sequence: draft.sequence,
                note: draft.note.trim(),
              }
            : ex
        )
      );
    } else {
      setExercises((prev) => [
        ...prev,
        {
          id: draft.name.toLowerCase().replace(/\s+/g, "-") + "-" + Date.now(),
          name: draft.name.trim(),
          level: draft.level,
          tags: draft.tags,
          sequence: draft.sequence,
          note: draft.note.trim(),
        },
      ]);
    }
    closeForm();
  }

  function startEdit(ex) {
    setDraft({
      name: ex.name,
      level: ex.level,
      tags: [...ex.tags],
      sequence: [...(ex.sequence || [])],
      note: ex.note || "",
    });
    setEditingId(ex.id);
    setShowForm(true);
  }

  function closeForm() {
    setDraft({ name: "", level: 1, tags: [], sequence: [], note: "" });
    setEditingId(null);
    setShowForm(false);
  }

  function removeExercise(id) {
    setExercises((prev) => prev.filter((ex) => ex.id !== id));
  }

  function startPractice() {
    setPracticeOrder(shuffleArray(exercises));
    setPracticeIndex(0);
    setPracticeAnswer({ level: null, tags: [], sequence: [] });
    setPracticeFinished(false);
    setMode("practice");
  }

  function exitPractice() {
    setMode("browse");
  }

  const currentPracticeExercise = practiceOrder[practiceIndex];

  const practicePercent = useMemo(() => {
    if (!currentPracticeExercise) return 0;
    const levelOk = practiceAnswer.level === currentPracticeExercise.level;
    const tagsOk = arraysEqualAsSets(practiceAnswer.tags, currentPracticeExercise.tags);
    const seqOk = arraysEqualAsSets(practiceAnswer.sequence, currentPracticeExercise.sequence || []);
    const correctCount = [levelOk, tagsOk, seqOk].filter(Boolean).length;
    return Math.round((correctCount / 3) * 100);
  }, [practiceAnswer, currentPracticeExercise]);

  function setPracticeLevel(l) {
    setPracticeAnswer((a) => ({ ...a, level: l }));
  }

  function togglePracticeTag(t) {
    setPracticeAnswer((a) => ({
      ...a,
      tags: a.tags.includes(t) ? a.tags.filter((v) => v !== t) : [...a.tags, t],
    }));
  }

  function togglePracticeSequence(s) {
    setPracticeAnswer((a) => ({
      ...a,
      sequence: a.sequence.includes(s) ? a.sequence.filter((v) => v !== s) : [...a.sequence, s],
    }));
  }

  function nextPractice() {
    if (practicePercent < 100) return;
    if (practiceIndex + 1 < practiceOrder.length) {
      setPracticeIndex((i) => i + 1);
      setPracticeAnswer({ level: null, tags: [], sequence: [] });
    } else {
      setPracticeFinished(true);
    }
  }

  function startPractice2() {
    setPractice2Order(shuffleArray(CRITERIA));
    setPractice2Index(0);
    setPractice2Selected([]);
    setPractice2Finished(false);
    setMode("practice2");
  }

  function exitPractice2() {
    setMode("browse");
  }

  const currentPractice2Criterion = practice2Order[practice2Index];

  const practice2Percent = useMemo(() => {
    if (!currentPractice2Criterion || exercises.length === 0) return 0;
    let correctCount = 0;
    exercises.forEach((ex) => {
      const actual = ex.tags.includes(currentPractice2Criterion);
      const selected = practice2Selected.includes(ex.id);
      if (actual === selected) correctCount += 1;
    });
    return Math.round((correctCount / exercises.length) * 100);
  }, [practice2Selected, currentPractice2Criterion, exercises]);

  function togglePractice2Exercise(id) {
    setPractice2Selected((prev) =>
      prev.includes(id) ? prev.filter((v) => v !== id) : [...prev, id]
    );
  }

  function nextPractice2() {
    if (practice2Percent < 100) return;
    if (practice2Index + 1 < practice2Order.length) {
      setPractice2Index((i) => i + 1);
      setPractice2Selected([]);
    } else {
      setPractice2Finished(true);
    }
  }

  function startPractice3() {
    setPractice3Order(shuffleArray(SEQUENCING));
    setPractice3Index(0);
    setPractice3Selected([]);
    setPractice3Finished(false);
    setMode("practice3");
  }

  function exitPractice3() {
    setMode("browse");
  }

  const currentPractice3Sequence = practice3Order[practice3Index];

  const practice3Percent = useMemo(() => {
    if (!currentPractice3Sequence || exercises.length === 0) return 0;
    let correctCount = 0;
    exercises.forEach((ex) => {
      const actual = (ex.sequence || []).includes(currentPractice3Sequence);
      const selected = practice3Selected.includes(ex.id);
      if (actual === selected) correctCount += 1;
    });
    return Math.round((correctCount / exercises.length) * 100);
  }, [practice3Selected, currentPractice3Sequence, exercises]);

  function togglePractice3Exercise(id) {
    setPractice3Selected((prev) =>
      prev.includes(id) ? prev.filter((v) => v !== id) : [...prev, id]
    );
  }

  function nextPractice3() {
    if (practice3Percent < 100) return;
    if (practice3Index + 1 < practice3Order.length) {
      setPractice3Index((i) => i + 1);
      setPractice3Selected([]);
    } else {
      setPractice3Finished(true);
    }
  }

  if (mode === "practice") {
    return (
      <div className="min-h-screen w-full" style={{ backgroundColor: "#EFEDE7" }}>
        <div className="max-w-2xl mx-auto px-6 py-10">
          <div className="mb-8 flex items-center justify-between">
            <h1
              className="text-3xl tracking-tight"
              style={{ color: "#1F2A24", fontFamily: "Georgia, 'Times New Roman', serif", fontWeight: 700 }}
            >
              Übungsmodus
            </h1>
            <button
              onClick={exitPractice}
              className="px-3 py-2 rounded-md text-sm"
              style={{ backgroundColor: "#FFFFFF", color: "#1F2A24", border: "1px solid #D8D3C7" }}
            >
              Beenden
            </button>
          </div>

          {practiceFinished || !currentPracticeExercise ? (
            <div
              className="p-8 rounded-md text-center"
              style={{ backgroundColor: "#FFFFFF", border: "1px solid #D8D3C7" }}
            >
              <p className="text-lg mb-4" style={{ color: "#1F2A24" }}>
                Geschafft! Du hast alle {practiceOrder.length} Übungen abgeschlossen.
              </p>
              <div className="flex gap-3 justify-center">
                <button
                  onClick={startPractice}
                  className="px-4 py-2 rounded text-sm"
                  style={{ backgroundColor: "#1F2A24", color: "#EFEDE7" }}
                >
                  Nochmal starten
                </button>
                <button
                  onClick={exitPractice}
                  className="px-4 py-2 rounded text-sm"
                  style={{ backgroundColor: "#FFFFFF", color: "#1F2A24", border: "1px solid #D8D3C7" }}
                >
                  Zur Übersicht
                </button>
              </div>
            </div>
          ) : (
            <div>
              <div className="mb-4 text-sm" style={{ color: "#7A7568" }}>
                Übung {practiceIndex + 1} von {practiceOrder.length}
              </div>

              <div
                className="p-6 rounded-md mb-6"
                style={{ backgroundColor: "#FFFFFF", border: "1px solid #D8D3C7" }}
              >
                <div className="flex items-center justify-between mb-2">
                  <span className="text-2xl font-semibold" style={{ color: "#1F2A24" }}>
                    {currentPracticeExercise.name}
                  </span>
                  <span className="text-sm font-semibold" style={{ color: practicePercent === 100 ? "#4F8B5C" : "#7A7568" }}>
                    {practicePercent}%
                  </span>
                </div>
                <div
                  style={{

              onClick={exportData}
              className="px-3 py-2 rounded-md text-sm"
              style={{ backgroundColor: "#FFFFFF", color: "#1F2A24", border: "1px solid #D8D3C7" }}
            >
              Exportieren
            </button>
            <button
              onClick={() => fileInputRef.current && fileInputRef.current.click()}
              className="px-3 py-2 rounded-md text-sm"
              style={{ backgroundColor: "#FFFFFF", color: "#1F2A24", border: "1px solid #D8D3C7" }}
            >
              Importieren
            </button>
            <input
              type="file"
              accept="application/json"
              ref={fileInputRef}
              onChange={importData}
              style={{ display: "none" }}
            />
            <button
              onClick={resetToDefault}
              className="px-3 py-2 rounded-md text-sm"
              style={{ backgroundColor: "#FFFFFF", color: "#B5473A", border: "1px solid #D8D3C7" }}
            >
              Zurücksetzen
            </button>
            <button
              onClick={startPractice}
              className="px-3 py-2 rounded-md text-sm"
              style={{ backgroundColor: "#1F2A24", color: "#EFEDE7" }}
            >
              Übungsmodus starten
            </button>
            <button
              onClick={startPractice2}
              className="px-3 py-2 rounded-md text-sm"
              style={{ backgroundColor: "#1F2A24", color: "#EFEDE7" }}
            >
              Kriterien-Modus starten
            </button>
            <button
              onClick={startPractice3}
              className="px-3 py-2 rounded-md text-sm"
              style={{ backgroundColor: "#1F2A24", color: "#EFEDE7" }}
            >
              Sequenzierungsmodus starten
            </button>
            <button
              onClick={() => setMode("table")}
              className="px-3 py-2 rounded-md text-sm"
              style={{ backgroundColor: "#FFFFFF", color: "#1F2A24", border: "1px solid #D8D3C7" }}
            >
              Tabellenansicht
            </button>
          </div>
        </div>

        {showResetConfirm && (
          <div
            className="mb-8 p-4 rounded-md flex items-center justify-between flex-wrap gap-3"
            style={{ backgroundColor: "#FFFFFF", border: "1px solid #B5473A" }}
          >
            <span className="text-sm" style={{ color: "#1F2A24" }}>
              Gespeicherter Stand wird gelöscht und durch die Übungen aus dem aktuellen Code ersetzt. Fortfahren?
            </span>
            <div className="flex gap-2">
              <button
                onClick={confirmReset}
                className="px-3 py-2 rounded-md text-sm"
                style={{ backgroundColor: "#B5473A", color: "#FFFFFF" }}
              >
                Ja, zurücksetzen
              </button>
              <button
                onClick={cancelReset}
                className="px-3 py-2 rounded-md text-sm"
                style={{ backgroundColor: "#FFFFFF", color: "#1F2A24", border: "1px solid #D8D3C7" }}
              >
                Abbrechen
              </button>
            </div>
          </div>
        )}

        {showForm && (
          <div className="mb-8 p-4 rounded-md" style={{ backgroundColor: "#FFFFFF", border: "1px solid #D8D3C7" }}>
            <div className="flex justify-between items-center mb-3">
              <span className="text-sm font-semibold" style={{ color: "#1F2A24" }}>
                {editingId ? "Übung bearbeiten" : "Neue Übung"}
              </span>
              <button onClick={closeForm} style={{ color: "#7A7568" }}>
                ✕
              </button>
            </div>
            <div className="space-y-3">
              <input
                value={draft.name}
                onChange={(e) => setDraft({ ...draft, name: e.target.value })}
                placeholder="Name der Übung"
                className="w-full px-3 py-2 rounded text-sm outline-none"
                style={{ border: "1px solid #D8D3C7" }}
              />
              <div className="flex gap-2 flex-wrap">
                {LEVELS.map((l) => (
                  <button
                    key={l.id}
                    onClick={() => setDraft({ ...draft, level: l.id })}
                    className="flex items-center gap-2 px-3 py-1.5 rounded text-sm"
                    style={{
                      backgroundColor: draft.level === l.id ? "#1F2A24" : "#F2EFE9",
                      color: draft.level === l.id ? "#EFEDE7" : "#1F2A24",
                    }}
                  >
                    <LevelDot level={l.id} size={8} />
                    {l.label}
                  </button>
                ))}
              </div>
              <div className="flex gap-2 flex-wrap">
                {CRITERIA.map((c) => {
                  const active = draft.tags.includes(c);
                  return (
                    <button
                      key={c}
                      onClick={() =>
                        setDraft({
                          ...draft,
                          tags: active ? draft.tags.filter((t) => t !== c) : [...draft.tags, c],
                        })
                      }
                      className="px-3 py-1.5 rounded text-sm"
                      style={{
                        backgroundColor: active ? "#3E6E8E" : "#F2EFE9",
                        color: active ? "#FFFFFF" : "#1F2A24",
                      }}
                    >
                      {c}
                    </button>
                  );
                })}
              </div>
              <div className="flex gap-2 flex-wrap">
                {SEQUENCING.map((s) => {
                  const active = draft.sequence.includes(s);
                  return (
                    <button
                      key={s}
                      onClick={() =>
                        setDraft({
                          ...draft,
                          sequence: active ? draft.sequence.filter((v) => v !== s) : [...draft.sequence, s],
                        })
                      }
                      className="px-3 py-1.5 rounded"
                      style={{
                        backgroundColor: active ? "#8A6D3F" : "#F2EFE9",
                        color: active ? "#FFFFFF" : "#1F2A24",
                        fontSize: "1.75rem",
                        fontWeight: 700,
                      }}
                    >
                      {s}
                    </button>
                  );
                })}
              </div>
              <input
                value={draft.note}
                onChange={(e) => setDraft({ ...draft, note: e.target.value })}
                placeholder="Notiz (optional)"
                className="w-full px-3 py-2 rounded text-sm outline-none"
                style={{ border: "1px solid #D8D3C7" }}
              />
              <button
                onClick={saveExercise}
                className="px-4 py-2 rounded text-sm"
                style={{ backgroundColor: "#1F2A24", color: "#EFEDE7" }}
              >
                {editingId ? "Änderungen speichern" : "Speichern"}
              </button>
            </div>
          </div>
        )}

        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {filtered.map((ex) => (
            <div
              key={ex.id}
              className="p-4 rounded-md relative"
              style={{ backgroundColor: "#FFFFFF", border: "1px solid #D8D3C7" }}
            >
              <div style={{ position: "absolute", top: 8, right: 8, display: "flex", gap: "8px" }}>
                <button
                  onClick={() => startEdit(ex)}
                  title="Übung bearbeiten"
                  style={{
                    color: "#3E6E8E",
                    fontSize: "0.75rem",
                    background: "none",
                    border: "none",
                    cursor: "pointer",
                  }}
                >
                  ✎
                </button>
                <button
                  onClick={() => removeExercise(ex.id)}
                  title="Übung entfernen"
                  style={{
                    color: "#B5473A",
                    fontSize: "0.75rem",
                    background: "none",
                    border: "none",
                    cursor: "pointer",
                  }}
                >
                  ✕
                </button>
              </div>
              <div className="flex items-start justify-between mb-2 pr-8">
                <span className="font-semibold" style={{ color: "#1F2A24" }}>
                  {ex.name}
                </span>
                <div className="flex flex-col items-end gap-1">
                  <div className="flex items-center gap-1.5">
                    <LevelDot level={ex.level} />
                    <span className="text-xs" style={{ color: "#7A7568" }}>
                      L{ex.level}
                    </span>
                  </div>
                  {(ex.sequence || []).length > 0 && (
                    <div className="flex gap-1">
                      {ex.sequence.map((s) => (
                        <span
                          key={"seq-" + s}
                          style={{ color: "#8A6D3F", fontSize: "1.33rem", fontWeight: 700, lineHeight: 1 }}
                        >
                          {s}
                        </span>
                      ))}
                    </div>
                  )}
                </div>
              </div>
              <div className="flex gap-1.5 flex-wrap mb-2">
                {ex.tags.map((t) => (
                  <span
                    key={t}
                    className="text-xs px-2 py-0.5 rounded"
                    style={{ backgroundColor: "#EFEDE7", color: "#3E6E8E" }}
                  >
                    {t}
                  </span>
                ))}
              </div>
              {ex.note && (
                <p className="text-sm" style={{ color: "#5C5646" }}>
                  {ex.note}
                </p>
              )}
            </div>
          ))}
          {filtered.length === 0 && (
            <div className="col-span-full text-center py-12" style={{ color: "#7A7568" }}>
              Keine Übung passt zu dieser Kombination.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<PilatesReformerFilter />, document.getElementById("root"));
</script>
</body>
</html>
